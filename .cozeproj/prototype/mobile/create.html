<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 - 中东沙漠金主题 === */
      --color-primary:              #B8860B;        /* 暗金色 - 沙漠奢华感 */
      --color-primary-container:    #F5E6C8;        /* 浅金 - 选中态背景 */
      --color-on-primary:           #FFFFFF;        /* 白色文字 */
      
      /* === 背景 / 表面 === */
      --color-background:                 #FFFDF7;        /* 象牙白 - 温暖底色 */
      --color-surface-container-lowest:   #FFFFFF;        /* 纯白 - 最上层卡片 */
      --color-surface:                    #FFF9F0;        /* 暖白 - 页面卡片 */
      --color-surface-container:          #F5F0E8;        /* 浅米灰 - 输入框背景 */
      --color-surface-container-high:     #EDE6DA;       /* 深米灰 - 高亮状态 */
      --color-surface-container-highest:  #E5DDCB;       /* 更深米灰 - 最高层级 */
      
      /* === 文字 === */
      --color-on-surface:           #2C2416;        /* 深棕 - 主文字 */
      --color-on-surface-variant:   #6B5D4D;        /* 中棕 - 次要文字 */
      
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      
      /* === 边框 === */
      --color-outline:          #D4C5B5;
      --color-outline-variant:  #E8DED0;
      
      /* === 圆角 === */
      --radius-sm:   0.5rem;     /* 8px */
      --radius-md:   0.75rem;    /* 12px */
      --radius-lg:   1rem;       /* 16px */
      --radius-xl:   1.25rem;   /* 20px */
      --radius-2xl:  1.5rem;     /* 24px */
      --radius-full: 9999px;
      
      /* === 阴影 === */
      --shadow-card:   0 4px 16px rgba(44,36,22,0.08);
      --shadow-float:  0 10px 30px rgba(44,36,22,0.12);
      --shadow-dialog: 0 25px 50px rgba(44,36,22,0.18);
      
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    /* 中东几何花纹装饰 - SVG背景 */
    .pattern-geometric {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L37.32 15H52L40.34 24.27L45.86 40L30 30L14.14 40L19.66 24.27L8 15H22.68L30 0Z' fill='%23B8860B' fill-opacity='0.03'/%3E%3C/svg%3E");
    }
    
    /* 金色光晕效果 */
    .glow-gold {
      box-shadow: 0 0 20px rgba(184,134,11,0.15);
    }
    
    /* 阿拉伯花纹边框 */
    .border-pattern {
      border-image: repeating-linear-gradient(
        90deg,
        #B8860B 0px,
        #B8860B 4px,
        transparent 4px,
        transparent 8px
      ) 1;
    }
    
    body {
      min-height: max(812px, 100dvh);
      font-family: "Noto Sans SC", system-ui, sans-serif;
      background-color: #FFFDF7;
    }
    
    /* 禁止选中文本 */
    * {
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* 模板选中样式 */
    .template-item.selected {
      border-color: #B8860B;
      background-color: #F5E6C8;
    }
    
    /* 选项选中样式 */
    .option-item.selected {
      border-color: #B8860B;
      background-color: #F5E6C8;
    }
    
    /* 金色渐变按钮 */
    .btn-generate {
      background: linear-gradient(135deg, #D4A84B 0%, #B8860B 50%, #8B6914 100%);
    }
    
    /* IP形象金色边框动画 */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    .ip-frame-shimmer {
      background: linear-gradient(90deg, 
        #B8860B 0%, 
        #F5E6C8 25%, 
        #B8860B 50%, 
        #F5E6C8 75%, 
        #B8860B 100%
      );
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

            <div class="flex items-center gap-2 mb-1">
              <i data-lucide="sparkles" class="w-4 h-4 text-primary"></i>
              <span class="text-sm font-medium text-on-surface">保持原IP风格</span>
            </div>
            <p class="text-xs text-on-surface-variant">忠实还原原始形象</p>
          </div>
          <div class="option-item flex-1 p-3 rounded-xl border-2 border-outline-variant bg-surface-container cursor-pointer transition-all" data-style="creative" data-option="style">
            <div class="flex items-center gap-2 mb-1">
              <i data-lucide="wand-2" class="w-4 h-4 text-on-surface-variant"></i>
              <span class="text-sm font-medium text-on-surface">创意变形</span>

            <p class="text-xs text-on-surface-variant">融入艺术风格再创作</p>

        开始创作

  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]">
    <a href="home.html" id="nav-home" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="home" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">首页</span>
    </a>
    <a href="create.html" id="nav-create" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="palette" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">创作</span>
    </a>
    <a href="gallery.html" id="nav-gallery" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="images" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">我的作品</span>
    </a>
  </nav>

  <script>
    // 导航函数
    function navPush(route) {
      console.log('[原型演示] PUSH 到: ' + route);
      window.location.href = route;
    }
    
    function navReplace(route) {
      console.log('[原型演示] REPLACE 为: ' + route);
      window.location.replace(route);
    }
    
    function navReset(route) {
      console.log('[原型演示] RESET 到: ' + route);
      window.location.href = route;
    }
    
    function navBack() {
      console.log('[原型演示] BACK 返回上一页');
      if(window.history.length > 1) window.history.back();
    }
    
    $(function() {
      // 底部 TabBar 切换
      $('#nav-home').on('click', function(e) {
        e.preventDefault();
        navReset('home.html');
      });
      
      $('#nav-gallery').on('click', function(e) {
        e.preventDefault();
        navReset('gallery.html');
      });
      
      // 返回按钮
      $('#btn-back').on('click', function() {
        navBack();
      });
      
      // 更多按钮
      $('#btn-more').on('click', function() {
        console.log('打开更多操作菜单');
      });
      
      // 更换形象按钮
      $('#btn-change-ip').on('click', function() {
        console.log('打开形象选择页面');
        navPush('template-detail.html');
      });
      
      // 模板标签切换
      $('.template-tab').on('click', function() {
        const tab = $(this).data('tab');
        $('.template-tab').removeClass('bg-primary text-on-primary').addClass('bg-surface-container text-on-surface-variant');
        $(this).removeClass('bg-surface-container text-on-surface-variant').addClass('bg-primary text-on-primary');
        console.log('切换到模板分类:', tab);
      });
      
      // 模板选择
      $('#template-grid').on('click', '.template-item', function() {
        $(this).toggleClass('selected');
        const isSelected = $(this).hasClass('selected');
        if(isSelected) {
          $(this).removeClass('border-outline-variant').addClass('border-primary');
        } else {
          $(this).removeClass('border-primary').addClass('border-outline-variant');
        }
        const selectedCount = $('#template-grid .template-item.selected').length;
        $('#template-section span').text('已选 ' + selectedCount + ' 个');
        console.log('模板选择:', $(this).data('template'), '选中:', isSelected);
      });
      
      // 风格选择
      $('[data-option="style"]').on('click', function() {
        $('[data-option="style"]').removeClass('border-primary bg-primary-container').addClass('border-outline-variant bg-surface-container');
        $('[data-option="style"] i').removeClass('text-primary').addClass('text-on-surface-variant');
        $(this).removeClass('border-outline-variant bg-surface-container').addClass('border-primary bg-primary-container');
        $(this).find('i').removeClass('text-on-surface-variant').addClass('text-primary');
        console.log('风格选择:', $(this).data('style'));
      });
      
      // 尺寸选择
      $('[data-option="size"]').on('click', function() {
        $('[data-option="size"]').removeClass('border-primary bg-primary-container').addClass('border-outline-variant bg-surface-container');
        $('[data-option="size"] i').removeClass('text-primary').addClass('text-on-surface-variant');
        $(this).removeClass('border-outline-variant bg-surface-container').addClass('border-primary bg-primary-container');
        $(this).find('i').removeClass('text-on-surface-variant').addClass('text-primary');
        console.log('尺寸选择:', $(this).data('size'));
      });
      
      // 数量控制
      let count = 4;
      $('#count-display').text(count);
      
      $('#btn-minus').on('click', function() {
        if(count > 1) {
          count--;
          $('#count-display').text(count);
          console.log('数量减少:', count);
        }
      });
      
      $('#btn-plus').on('click', function() {
        if(count < 9) {
          count++;
          $('#count-display').text(count);
          console.log('数量增加:', count);
        }
      });
      
      // 生成按钮
      $('#btn-generate').on('click', function() {
        const selectedTemplates = [];
        $('#template-grid .template-item.selected').each(function() {
          selectedTemplates.push($(this).data('template'));
        });
        const style = $('[data-option="style"].selected, [data-option="style"].border-primary').data('style') || 'keep-ip';
        const size = $('[data-option="size"].selected, [data-option="size"].border-primary').data('size') || '9:16';
        
        console.log('开始生成:', {
          templates: selectedTemplates,
          style: style,
          size: size,
          count: count
        });
        
        // 跳转到生成结果/加载页面
        navPush('gallery.html');
      });
    });
  </script>
  <script>lucide.createIcons();</script>
</body>
